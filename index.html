<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ataxx Arcade · Touch Pointer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #11182d;
        --text: #e9f2ff;
        --accent: #46d8ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #1b2952, var(--bg));
        color: var(--text);
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .app {
        width: min(100%, 980px);
        background: color-mix(in oklab, var(--panel) 88%, black);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1rem, 2.6vw, 1.5rem);
      }

      .hint {
        margin: 0 0 12px;
        opacity: 0.9;
        font-size: 0.95rem;
      }


      .core-toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin: 0 0 12px;
        font-size: 0.9rem;
      }

      .core-toolbar select,
      .core-toolbar button {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 8px;
        padding: 6px 10px;
      }

      .game-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 10px;
        overflow: hidden;
        background: #000;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      .touch-layer {
        position: absolute;
        inset: 0;
        z-index: 30;
        touch-action: none;
        user-select: none;
      }

      .touch-layer::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.06));
        pointer-events: none;
      }

      .cursor {
        position: absolute;
        width: 30px;
        height: 30px;
        margin-left: -15px;
        margin-top: -15px;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.45), 0 0 12px rgba(70, 216, 255, 0.85);
        transform: translate3d(-9999px, -9999px, 0);
        pointer-events: none;
      }

      .cursor::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 8px;
        height: 8px;
        margin-left: -4px;
        margin-top: -4px;
        border-radius: 50%;
        background: var(--accent);
      }

      .touch-help {
        margin-top: 10px;
        font-size: 0.92rem;
        opacity: 0.9;
      }

      code {
        background: rgba(255, 255, 255, 0.07);
        padding: 1px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Ataxx (Arcade) · Control Touch tipo puntero</h1>
      <p class="hint">Toca sobre la pantalla para mover el puntero. Si no carga, cambia de core abajo y recarga.</p>

      <div class="core-toolbar">
        <label for="coreSelect">Core:</label>
        <select id="coreSelect">
          <option value="arcade">arcade (FBNeo)</option>
          <option value="mame2003">mame2003</option>
        </select>
        <button id="reloadCore" type="button">Aplicar y recargar</button>
      </div>

      <section class="game-wrap" aria-label="Emulador Ataxx">
        <section id="game"></section>

        <div class="touch-layer" id="touchLayer" aria-label="Capa táctil transparente">
          <div class="cursor" id="touchCursor" aria-hidden="true"></div>
        </div>
      </section>

      <p class="touch-help">
        <strong>Cómo usar:</strong> toca o arrastra para mover el puntero. Al soltar el dedo se envía
        <code>Botón 1</code> (equivalente a <code>Ctrl</code>) en la posición actual.
      </p>
    </main>

    <script>
      const savedCore = localStorage.getItem('ataxx_core');
      const selectedCore = savedCore || 'mame2003';

      window.EJS_player = '#game';
      window.EJS_core = selectedCore;
      window.EJS_gameName = 'Ataxx';
      window.EJS_gameUrl = 'ataxx.zip';
      window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
      window.EJS_startOnLoaded = true;
      window.EJS_onGameStart = () => {
        setTimeout(() => window.focus(), 200);
      };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
      const FIRE_KEY = 'Control';
      const DIR_KEYS = {
        up: 'ArrowUp',
        down: 'ArrowDown',
        left: 'ArrowLeft',
        right: 'ArrowRight'
      };

      const layer = document.getElementById('touchLayer');
      const cursorEl = document.getElementById('touchCursor');
      const coreSelect = document.getElementById('coreSelect');
      const reloadCore = document.getElementById('reloadCore');

      coreSelect.value = window.EJS_core;
      reloadCore.addEventListener('click', () => {
        localStorage.setItem('ataxx_core', coreSelect.value);
        const url = new URL(window.location.href);
        url.searchParams.set('core', coreSelect.value);
        window.location.href = url.toString();
      });

      const activeDir = new Set();
      let pointerId = null;
      let animationId = null;

      const cursorPos = { x: 0.5, y: 0.5 };
      const targetPos = { x: 0.5, y: 0.5 };

      function keyEvent(type, key) {
        const evt = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });
        window.dispatchEvent(evt);
        document.dispatchEvent(evt);
      }

      function pressDir(dir) {
        if (activeDir.has(dir)) return;
        activeDir.add(dir);
        keyEvent('keydown', DIR_KEYS[dir]);
      }

      function releaseDir(dir) {
        if (!activeDir.has(dir)) return;
        activeDir.delete(dir);
        keyEvent('keyup', DIR_KEYS[dir]);
      }

      function releaseAllDirs() {
        ['up', 'down', 'left', 'right'].forEach(releaseDir);
      }

      function pulseFire() {
        keyEvent('keydown', FIRE_KEY);
        setTimeout(() => keyEvent('keyup', FIRE_KEY), 60);
      }

      function clamp01(value) {
        return Math.min(1, Math.max(0, value));
      }

      function setTargetFromClient(clientX, clientY) {
        const rect = layer.getBoundingClientRect();
        targetPos.x = clamp01((clientX - rect.left) / rect.width);
        targetPos.y = clamp01((clientY - rect.top) / rect.height);
      }

      function renderCursor() {
        const rect = layer.getBoundingClientRect();
        cursorEl.style.transform = `translate3d(${cursorPos.x * rect.width}px, ${cursorPos.y * rect.height}px, 0)`;
      }

      function driveDirections(dx, dy) {
        const threshold = 0.016;
        if (dy < -threshold) pressDir('up'); else releaseDir('up');
        if (dy > threshold) pressDir('down'); else releaseDir('down');
        if (dx < -threshold) pressDir('left'); else releaseDir('left');
        if (dx > threshold) pressDir('right'); else releaseDir('right');
      }

      function tick() {
        const easing = 0.34;
        const dx = targetPos.x - cursorPos.x;
        const dy = targetPos.y - cursorPos.y;

        cursorPos.x += dx * easing;
        cursorPos.y += dy * easing;

        const remainingX = targetPos.x - cursorPos.x;
        const remainingY = targetPos.y - cursorPos.y;

        driveDirections(remainingX, remainingY);
        renderCursor();

        animationId = requestAnimationFrame(tick);
      }

      function startLoop() {
        if (animationId !== null) return;
        animationId = requestAnimationFrame(tick);
      }

      function stopLoop() {
        if (animationId === null) return;
        cancelAnimationFrame(animationId);
        animationId = null;
        releaseAllDirs();
      }

      layer.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        pointerId = e.pointerId;
        layer.setPointerCapture(pointerId);
        setTargetFromClient(e.clientX, e.clientY);
        startLoop();
      });

      layer.addEventListener('pointermove', (e) => {
        if (e.pointerId !== pointerId) return;
        e.preventDefault();
        setTargetFromClient(e.clientX, e.clientY);
      });

      function onPointerRelease(e) {
        if (e.pointerId !== pointerId) return;
        e.preventDefault();
        pointerId = null;
        pulseFire();
        setTimeout(stopLoop, 80);
      }

      ['pointerup', 'pointercancel', 'pointerleave'].forEach((ev) => {
        layer.addEventListener(ev, onPointerRelease);
      });

      window.addEventListener('blur', () => {
        pointerId = null;
        stopLoop();
      });

      renderCursor();
    </script>
  </body>
</html>
