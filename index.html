<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ataxx Arcade Touch</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #11182d;
        --accent: #3ed0ff;
        --text: #e9f2ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #1b2952, var(--bg));
        color: var(--text);
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .app {
        width: min(100%, 980px);
        background: color-mix(in oklab, var(--panel) 88%, black);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1rem, 2.6vw, 1.5rem);
      }

      .hint {
        margin: 0 0 12px;
        opacity: 0.85;
        font-size: 0.92rem;
      }

      #game {
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 10px;
        overflow: hidden;
        background: #000;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        margin-top: 14px;
        user-select: none;
        touch-action: none;
      }

      .dpad {
        width: 170px;
        height: 170px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: radial-gradient(circle, rgba(255, 255, 255, 0.11), rgba(0, 0, 0, 0.25));
        position: relative;
        display: grid;
        place-items: center;
      }

      .stick {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: rgba(62, 208, 255, 0.8);
        border: 2px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 14px rgba(62, 208, 255, 0.6);
        transform: translate(0, 0);
        transition: transform 35ms linear;
      }

      .btn-fire {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: none;
        background: radial-gradient(circle at 30% 30%, #ff7d7d, #c32020);
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        box-shadow: 0 6px 20px rgba(255, 0, 0, 0.35);
      }

      .btn-fire:active,
      .btn-fire.active {
        transform: scale(0.95);
        filter: brightness(1.08);
      }

      @media (min-width: 860px) {
        .controls { max-width: 500px; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Ataxx (Arcade) · Modo Touch</h1>
      <p class="hint">ROM local: <code>ataxx.zip</code>. Palanca virtual + 1 botón (touch completo).</p>
      <section id="game"></section>

      <section class="controls" aria-label="Controles táctiles">
        <div class="dpad" id="dpad" aria-label="Palanca virtual">
          <div class="stick" id="stick"></div>
        </div>

        <button class="btn-fire" id="fire" aria-label="Botón 1">BOTÓN</button>
      </section>
    </main>

    <script>
      // EmulatorJS (MAME/Arcade)
      window.EJS_player = '#game';
      window.EJS_core = 'arcade';
      window.EJS_gameName = 'Ataxx';
      window.EJS_gameUrl = 'ataxx.zip';
      window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
      // Ocultamos los controles touch de EmulatorJS para usar los nuestros.
      window.EJS_startOnLoaded = true;
      window.EJS_onGameStart = () => {
        // Intenta enfocarlo para aceptar teclas virtuales.
        setTimeout(() => window.focus(), 200);
      };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script>
      const FIRE_KEY = 'Control'; // Botón 1 arcade (habitual en mapeos web)
      const DIR_KEYS = {
        up: 'ArrowUp',
        down: 'ArrowDown',
        left: 'ArrowLeft',
        right: 'ArrowRight'
      };

      const activeDir = new Set();

      function keyEvent(type, key) {
        const evt = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });
        window.dispatchEvent(evt);
        document.dispatchEvent(evt);
      }

      function pressDir(dir) {
        if (activeDir.has(dir)) return;
        activeDir.add(dir);
        keyEvent('keydown', DIR_KEYS[dir]);
      }

      function releaseDir(dir) {
        if (!activeDir.has(dir)) return;
        activeDir.delete(dir);
        keyEvent('keyup', DIR_KEYS[dir]);
      }

      function releaseAllDirs() {
        [...activeDir].forEach(releaseDir);
      }

      // --- Botón de acción ---
      const fireBtn = document.getElementById('fire');
      let firing = false;
      const fireDown = () => {
        if (firing) return;
        firing = true;
        fireBtn.classList.add('active');
        keyEvent('keydown', FIRE_KEY);
      };
      const fireUp = () => {
        if (!firing) return;
        firing = false;
        fireBtn.classList.remove('active');
        keyEvent('keyup', FIRE_KEY);
      };

      ['pointerdown', 'pointercancel', 'pointerup', 'pointerleave'].forEach((ev) => {
        fireBtn.addEventListener(ev, (e) => {
          e.preventDefault();
          if (ev === 'pointerdown') fireDown();
          else fireUp();
        });
      });

      // --- Palanca virtual analógica simple ---
      const dpad = document.getElementById('dpad');
      const stick = document.getElementById('stick');
      let pointerId = null;
      const RADIUS = 44;

      function evalDirection(x, y) {
        const threshold = 14;

        if (y < -threshold) pressDir('up'); else releaseDir('up');
        if (y > threshold) pressDir('down'); else releaseDir('down');
        if (x < -threshold) pressDir('left'); else releaseDir('left');
        if (x > threshold) pressDir('right'); else releaseDir('right');
      }

      function moveStick(clientX, clientY) {
        const rect = dpad.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        let x = clientX - cx;
        let y = clientY - cy;

        const mag = Math.hypot(x, y) || 1;
        if (mag > RADIUS) {
          x = (x / mag) * RADIUS;
          y = (y / mag) * RADIUS;
        }

        stick.style.transform = `translate(${x}px, ${y}px)`;
        evalDirection(x, y);
      }

      function resetStick() {
        stick.style.transform = 'translate(0, 0)';
        releaseAllDirs();
      }

      dpad.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        pointerId = e.pointerId;
        dpad.setPointerCapture(pointerId);
        moveStick(e.clientX, e.clientY);
      });

      dpad.addEventListener('pointermove', (e) => {
        if (e.pointerId !== pointerId) return;
        e.preventDefault();
        moveStick(e.clientX, e.clientY);
      });

      ['pointerup', 'pointercancel', 'pointerleave'].forEach((ev) => {
        dpad.addEventListener(ev, (e) => {
          if (e.pointerId !== pointerId) return;
          e.preventDefault();
          pointerId = null;
          resetStick();
        });
      });

      window.addEventListener('blur', () => {
        resetStick();
        fireUp();
      });
    </script>
  </body>
</html>
